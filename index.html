<!DOCTYPE html>
<html lang="uk">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="theme-color" content="#0d0f14" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="Навігатор" />
  <link rel="manifest" href="manifest.json" />
  <link rel="apple-touch-icon" href="icon-192.svg" />
  <title>Навігатор дня</title>
  <link href="https://fonts.googleapis.com/css2?family=Raleway:wght@300;400;600;700&family=Literata:ital,wght@0,300;0,400;0,600;1,300;1,400&display=swap" rel="stylesheet" />
  <style>
    :root {
      --bg:    #0d0f14;
      --s1:    #13161d;
      --s2:    #191d26;
      --s3:    #1f2330;
      --gold:  #b8975a;
      --gold2: #d4af6e;
      --gold3: #ead898;
      --teal:  #4a8c7f;
      --teal2: #68b5a4;
      --red:   #c05a3a;
      --cream: #e8dfc8;
      --muted: #6b7280;
      --mut2:  #9ca3af;
      --bord:  rgba(184,151,90,0.12);
      --bord2: rgba(184,151,90,0.25);
      --glow:  rgba(184,151,90,0.05);
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Raleway', sans-serif;
      background: var(--bg);
      color: var(--cream);
      min-height: 100dvh;
      padding-top: env(safe-area-inset-top, 0);
      padding-bottom: env(safe-area-inset-bottom, 16px);
      background-image:
        radial-gradient(ellipse 70% 50% at 15% 5%,  rgba(184,151,90,0.055) 0%, transparent 55%),
        radial-gradient(ellipse 50% 70% at 85% 95%, rgba(74,140,127,0.055) 0%, transparent 55%);
    }

    /* HEADER */
    header {
      display: flex; align-items: center; gap: 12px;
      padding: 16px 14px 12px;
      border-bottom: 1px solid var(--bord);
    }
    .logo { width: 44px; height: 44px; flex-shrink: 0; }
    .h-meta { flex: 1; overflow: hidden; }
    .h-title {
      font-family: 'Literata', serif;
      font-size: 1.38rem; font-weight: 600;
      color: var(--gold2); letter-spacing: 0.04em; line-height: 1;
    }
    .h-date {
      font-size: 0.72rem; color: var(--muted);
      letter-spacing: 0.1em; text-transform: uppercase; margin-top: 3px;
    }
    .refresh-btn {
      background: none; border: 1px solid var(--bord2); color: var(--muted);
      width: 34px; height: 34px; border-radius: 50%; cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      font-size: 0.9rem; transition: all 0.2s; flex-shrink: 0;
    }
    .refresh-btn:active { border-color: var(--gold); color: var(--gold); transform: scale(0.9); }
    .refresh-btn.spin svg { animation: spin 1s linear infinite; }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* GRID */
    .grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 9px;
      padding: 11px 11px 16px;
    }

    .card {
      background: var(--s1);
      border: 1px solid var(--bord);
      border-radius: 14px;
      padding: 13px;
      position: relative; overflow: hidden;
      animation: fadeUp 0.45s ease both;
    }
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(10px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    .card:nth-child(1) { animation-delay: 0.05s; }
    .card:nth-child(2) { animation-delay: 0.10s; }
    .card:nth-child(3) { animation-delay: 0.15s; grid-column: 1/-1; }
    .card:nth-child(4) { animation-delay: 0.20s; grid-column: 1/-1; }
    .card:nth-child(5) { animation-delay: 0.25s; grid-column: 1/-1; }

    .lbl {
      font-size: 0.68rem; letter-spacing: 0.12em;
      text-transform: uppercase; color: var(--muted);
      margin-bottom: 9px; display: flex; align-items: center; gap: 5px;
    }

    /* CURRENCY */
    .rate-val {
      font-family: 'Literata', serif;
      font-size: 2.15rem; font-weight: 300; line-height: 1;
      color: var(--gold3);
    }
    .rate-unit { font-size: 0.70rem; color: var(--muted); margin-top: 4px; }
    .rate-badge {
      font-size: 0.69rem; margin-top: 6px; padding: 2px 6px;
      border-radius: 4px; display: inline-block;
      background: rgba(107,114,128,0.15); color: var(--mut2);
    }

    /* WEATHER */
    .w-main { display: flex; align-items: flex-end; gap: 10px; margin-bottom: 8px; }
    .w-temp {
      font-family: 'Literata', serif;
      font-size: 3rem; font-weight: 300; line-height: 1; color: var(--cream);
    }
    .w-temp sup { font-size: 1.1rem; color: var(--mut2); vertical-align: super; }
    .w-right { flex: 1; }
    .w-desc {
      font-family: 'Literata', serif;
      font-size: 1.12rem; font-style: italic; color: var(--gold2); margin-bottom: 4px;
    }
    .w-meta { font-size: 0.72rem; color: var(--mut2); line-height: 1.75; }
    .w-wind { display: flex; align-items: center; gap: 4px; margin-top: 2px; font-size: 0.72rem; color: var(--mut2); }
    .w-alert {
      background: rgba(192,90,58,0.12); border: 1px solid rgba(192,90,58,0.28);
      border-radius: 8px; padding: 7px 10px; font-size: 0.72rem;
      color: #e08060; margin-top: 9px; display: none; line-height: 1.55;
    }
    .w-alert.on { display: block; }

    .forecast {
      display: flex; gap: 7px;
      margin-top: 11px; border-top: 1px solid var(--bord); padding-top: 9px;
    }
    .f-day { flex: 1; text-align: center; }
    .f-day .fn { font-size: 0.68rem; color: var(--muted); text-transform: uppercase; letter-spacing: 0.08em; }
    .f-day .fi { font-size: 1.15rem; margin: 3px 0; }
    .f-day .ft { font-family: 'Literata', serif; font-size: 1.10rem; color: var(--cream); }
    .f-day .fw { font-size: 0.65rem; color: var(--muted); margin-top: 1px; }

    /* SLAVIC */
    .sl-name {
      font-family: 'Literata', serif;
      font-size: 1.52rem; font-weight: 600; color: var(--gold2); margin-bottom: 6px;
    }
    .sl-div { height: 1px; background: linear-gradient(90deg, transparent, var(--bord2), transparent); margin: 0 0 9px; }
    .sl-text { font-size: 0.76rem; color: var(--mut2); line-height: 1.72; }
    .sl-omen {
      margin-top: 9px; font-size: 0.72rem; font-style: italic;
      color: var(--teal2); border-left: 2px solid var(--teal); padding-left: 8px; line-height: 1.6;
    }

    /* WORDS */
    .words { display: flex; flex-direction: column; gap: 7px; }
    .word-row {
      background: var(--s2); border: 1px solid var(--bord);
      border-radius: 8px; padding: 8px 10px;
    }
    .word-top { display: flex; align-items: baseline; gap: 7px; }
    .word-pl {
      font-family: 'Literata', serif;
      font-size: 1.18rem; font-weight: 600; color: var(--gold3);
    }
    .word-sep { font-size: 0.76rem; color: var(--muted); }
    .word-ru { font-size: 0.77rem; color: var(--mut2); }
    .word-ex { font-size: 0.70rem; color: var(--muted); font-style: italic; margin-top: 2px; line-height: 1.5; }

    /* SKELETON */
    .skel {
      background: linear-gradient(90deg, var(--s2) 25%, var(--s3) 50%, var(--s2) 75%);
      background-size: 200% 100%; animation: shim 1.5s infinite;
      border-radius: 4px;
    }
    @keyframes shim { to { background-position: -200% 0; } }
  </style>
</head>

<script>
// ── helpers ──────────────────────────────────
const $ = id => document.getElementById(id);

function setHeader() {
  const n = new Date();
  const days   = ['неділя','понеділок','вівторок','середа','четвер','п\'ятниця','субота'];
  const months = ['січня','лютого','березня','квітня','травня','червня',
                  'липня','серпня','вересня','жовтня','листопада','грудня'];
  $('hDate').textContent = `${days[n.getDay()]}, ${n.getDate()} ${months[n.getMonth()]} ${n.getFullYear()}`;
}

function windDir(deg) {
  return ['Пн','Пн-Сх','Сх','Пд-Сх','Пд','Пд-Зх','Зх','Пн-Зх'][Math.round(deg/45)%8];
}
function wIcon(c) {
  if (c===0) return '☀️'; if (c<=2) return '🌤️'; if (c===3) return '☁️';
  if (c<=48) return '🌫️'; if (c<=55) return '🌦️'; if (c<=67) return '🌧️';
  if (c<=77) return '❄️'; if (c<=82) return '🌧️'; if (c<=86) return '🌨️';
  return '⛈️';
}
function wDesc(c) {
  if (c===0) return 'ясно'; if (c<=2) return 'мінлива хмарність'; if (c===3) return 'похмуро';
  if (c<=48) return 'туман'; if (c<=55) return 'мряка'; if (c<=67) return 'дощ';
  if (c<=77) return 'сніг'; if (c<=82) return 'злива'; return 'гроза';
}

// ── currency ─────────────────────────────────
async function loadCurrency() {
  try {
    // USD→PLN via Frankfurter
    const f = await (await fetch('https://api.frankfurter.app/latest?from=USD&to=PLN')).json();
    const usdPln = f.rates.PLN;
    $('usdPln').textContent = usdPln.toFixed(4);
    $('usdPlnBadge').textContent = 'актуальный курс';
    markFresh('dotCur');
    startBar('barCur', INTERVAL_CURRENCY);
  } catch {
    $('usdPln').textContent = '—';
    $('usdPlnBadge').textContent = 'ошибка сети';
    markStale('dotCur');
  }

  try {
    // PLN→UAH via НБУ (Нацбанк Украины) — free, no key needed
    const nbu = await (await fetch('https://bank.gov.ua/NBUStatService/v1/statdirectory/exchange?valcode=PLN&json')).json();
    const plnUah = nbu[0]?.rate;
    $('plnUah').textContent = plnUah ? plnUah.toFixed(4) : '—';
    $('plnUahBadge').textContent = plnUah ? 'актуальный курс' : 'нет данных';
    markFresh('dotCur2');
    startBar('barCur2', INTERVAL_CURRENCY);
  } catch {
    $('plnUah').textContent = '—';
    $('plnUahBadge').textContent = 'ошибка сети';
    markStale('dotCur2');
  }

  lastCurrency = Date.now();
}

// ── weather ──────────────────────────────────
async function loadWeather() {
  try {
    const pos = await new Promise((ok, no) =>
      navigator.geolocation.getCurrentPosition(ok, no, { timeout: 7000 }));
    const { latitude: lat, longitude: lon } = pos.coords;

    // city name
    try {
      const gd = await (await fetch(
        `https://nominatim.openstreetmap.org/reverse?lat=${lat}&lon=${lon}&format=json`,
        { headers: { 'Accept-Language': 'uk' } }
      )).json();
      $('wCity').textContent = gd.address?.city || gd.address?.town || gd.address?.village || 'ваше місто';
    } catch { $('wCity').textContent = 'ваше місто'; }

    const url = `https://api.open-meteo.com/v1/forecast?latitude=${lat}&longitude=${lon}`
      + `&current=temperature_2m,apparent_temperature,relative_humidity_2m,weather_code,wind_speed_10m,wind_direction_10m`
      + `&daily=weather_code,temperature_2m_max,temperature_2m_min,wind_speed_10m_max`
      + `&wind_speed_unit=ms&timezone=auto&forecast_days=4`;

    const wd = await (await fetch(url)).json();
    const c = wd.current;

    $('wTemp').innerHTML  = `${Math.round(c.temperature_2m)}<sup>°</sup>`;
    $('wDesc').textContent  = wDesc(c.weather_code);
    $('wFeels').textContent = Math.round(c.apparent_temperature);
    $('wHum').textContent   = c.relative_humidity_2m;
    $('wWind').textContent  = c.wind_speed_10m.toFixed(1);
    $('wDir').textContent   = windDir(c.wind_direction_10m);

    // alert if temp changes > 8°
    const diff = wd.daily.temperature_2m_max[1] - wd.daily.temperature_2m_max[0];
    if (Math.abs(diff) >= 8) {
      $('wAlert').textContent = diff > 0
        ? `⚠️ Завтра різко тепліше: +${diff.toFixed(0)}°`
        : `⚠️ Завтра різке похолодання: ${diff.toFixed(0)}°`;
      $('wAlert').classList.add('on');
    }

    // forecast days 1-3
    const dayNames = ['Нд','Пн','Вт','Ср','Чт','Пт','Сб'];
    $('forecast').innerHTML = [1,2,3].map(i => {
      const dt = new Date(wd.daily.time[i]);
      return `<div class="f-day">
        <div class="fn">${dayNames[dt.getDay()]}</div>
        <div class="fi">${wIcon(wd.daily.weather_code[i])}</div>
        <div class="ft">${Math.round(wd.daily.temperature_2m_max[i])}° / <span style="color:var(--muted)">${Math.round(wd.daily.temperature_2m_min[i])}°</span></div>
        <div class="fw">💨 ${wd.daily.wind_speed_10m_max[i].toFixed(0)} м/с</div>
      </div>`;
    }).join('');

  } catch(e) {
    $('wTemp').innerHTML   = '—';
    $('wDesc').textContent  = 'дозвольте геолокацію';
    $('wCity').textContent  = '—';
  }
}

function loadSlavic() {
  const n = new Date();
  const m = n.getMonth()+1, d = n.getDate();
  const score = e => e.m*100+e.d;
  const today = m*100+d;
  let e = SLAV.find(x => x.m===m && x.d===d);
  if (!e) {
    const past = SLAV.filter(x => score(x) <= today);
    e = past.length ? past[past.length-1] : SLAV[SLAV.length-1];
  }
  $('slName').textContent = e.n;
  $('slText').textContent = e.t;
  $('slOmen').textContent = '🌿 ' + e.o;
}

function loadWords() {
  const n = new Date();
  const seed = n.getFullYear()*10000 + (n.getMonth()+1)*100 + n.getDate();
  const L = WORDS.length;
  const i0 = seed % L;
  const i1 = (seed*7+13) % L;
  const i2 = (seed*13+29) % L;
  const w = [WORDS[i0],
             WORDS[i1!==i0 ? i1 : (i1+1)%L],
             WORDS[i2!==i0&&i2!==i1 ? i2 : (i2+3)%L]];
  $('words').innerHTML = w.map(x => `
    <div class="word-row">
      <div class="word-top">
        <span class="word-pl">${x.pl}</span>
        <span class="word-sep">—</span>
        <span class="word-ru">${x.ru}</span>
      </div>
      <div class="word-ex">${x.ex}</div>
    </div>`).join('');
}
